services:
  app:
    build:
      context: .
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: http://localhost:3000
      MONGO_URI: mongodb://mongo:27017/manageinsync
    ports:
      - "3000:3000"
    restart: unless-stopped

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: manageinsync
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
